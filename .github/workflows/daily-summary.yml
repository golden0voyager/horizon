name: Daily Horizon Summary

on:
  schedule:
    - cron: '0 0 * * *'  # 每天北京时间早上 8:00 运行 (UTC 00:00)
  workflow_dispatch:      # 允许手动触发执行

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许修改仓库内容以保存总结

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Run Horizon
        env:
          # AI Config Overrides (来自 GitHub Secrets)
          HORIZON_AI_PROVIDER: ${{ secrets.HORIZON_AI_PROVIDER }}
          HORIZON_AI_MODEL: ${{ secrets.HORIZON_AI_MODEL }}
          HORIZON_AI_API_KEY_ENV: ${{ secrets.HORIZON_AI_API_KEY_ENV }}
          
          # API Keys
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          XIAOMIMIMO_API_KEY: ${{ secrets.XIAOMIMIMO_API_KEY }}
          XIAOMIMIMO_BASE_URL: ${{ secrets.XIAOMIMIMO_BASE_URL }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          
          # Tools
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HORIZON_WEBHOOK_URL: ${{ secrets.HORIZON_WEBHOOK_URL }}
        run: uv run horizon

      - name: Commit and push generated summaries
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/summaries/ docs/_posts/
          git commit -m "📝 Daily Summary: $(date +'%Y-%m-%d') [skip ci]" || echo "No changes to commit"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true
          publish_branch: gh-pages
          enable_jekyll: true
