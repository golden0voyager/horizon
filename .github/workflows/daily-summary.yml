name: Daily Horizon Summary

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许修改仓库内容以保存总结

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --extra twitter

      - name: Install Playwright browsers
        run: uv run playwright install chromium

      - name: Prepare GitHub Actions config
        run: grep -v '^[[:space:]]*//' data/config.github.json > data/config.json

      - name: Prepare Twitter cookies
        run: |
          mkdir -p data
          if [ -n "${{ secrets.X_COOKIES_1 }}" ]; then
            echo "${{ secrets.X_COOKIES_1 }}" | base64 -d > data/x_cookies_1.json
          fi
          if [ -n "${{ secrets.X_COOKIES_2 }}" ]; then
            echo "${{ secrets.X_COOKIES_2 }}" | base64 -d > data/x_cookies_2.json
          fi
          if [ -n "${{ secrets.X_COOKIES_3 }}" ]; then
            echo "${{ secrets.X_COOKIES_3 }}" | base64 -d > data/x_cookies_3.json
          fi
          ls -la data/x_cookies_*.json || echo "No cookie files written"

      - name: Run Horizon
        env:
          # AI Config Overrides (来自 GitHub Secrets)
          HORIZON_AI_PROVIDER: ${{ secrets.HORIZON_AI_PROVIDER }}
          HORIZON_AI_MODEL: ${{ secrets.HORIZON_AI_MODEL }}
          HORIZON_AI_API_KEY_ENV: ${{ secrets.HORIZON_AI_API_KEY_ENV }}
          
          # API Keys
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          XIAOMIMIMO_API_KEY: ${{ secrets.XIAOMIMIMO_API_KEY }}
          XIAOMIMIMO_BASE_URL: ${{ secrets.XIAOMIMIMO_BASE_URL }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          SENSENOVA_API_KEY: ${{ secrets.SENSENOVA_API_KEY }}

          # Tools
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HORIZON_WEBHOOK_URL: ${{ secrets.HORIZON_WEBHOOK_URL }}
        run: uv run horizon

      - name: Commit and push generated summaries
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/summaries/ docs/_posts/
          git commit -m "📝 Daily Summary: $(date +'%Y-%m-%d') [skip ci]" || echo "No changes to commit"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true
          publish_branch: gh-pages
          enable_jekyll: true
